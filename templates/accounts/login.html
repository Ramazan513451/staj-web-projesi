{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetici Girişi - Yönetim Paneli</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS (for dark mode variables) -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-dark);
            margin: 0;
            transition: background-color 0.3s ease;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            border-radius: 12px;
            background-color: white; /* Will be overridden by [data-theme="dark"] .card if we use .card */
            box-shadow: var(--card-shadow);
        }
        .login-header {
            font-weight: 700;
            color: var(--primary-color);
            letter-spacing: -0.5px;
            margin-bottom: 2rem;
            text-align: center;
        }
        [data-theme="dark"] .login-card {
            background-color: #16213e;
            border: 1px solid rgba(255,255,255,0.05);
        }
        [data-theme="dark"] .login-header {
            color: #fff;
        }
    </style>
    <script>
        // Apply theme immediately to avoid flash
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="login-card">
            <h3 class="login-header">
                <i class="bi bi-grid-fill me-2"></i>Yönetim Paneli
            </h3>
            <form method="post">
                {% csrf_token %}
                {% if form.non_field_errors %}
                    <div class="alert alert-danger" role="alert">
                        {% for error in form.non_field_errors %}
                            {{ error }}
                        {% endfor %}
                    </div>
                {% endif %}
                <div class="mb-3">
                    <label for="{{ form.username.id_for_label }}" class="form-label fw-semibold">Kullanıcı Adı</label>
                    <input type="text" name="{{ form.username.name }}" id="{{ form.username.id_for_label }}" class="form-control form-control-lg" required autofocus>
                </div>
                <div class="mb-4">
                    <label for="{{ form.password.id_for_label }}" class="form-label fw-semibold">Şifre</label>
                    <input type="password" name="{{ form.password.name }}" id="{{ form.password.id_for_label }}" class="form-control form-control-lg" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">Giriş Yap</button>
            </form>
            <div class="text-center mt-4">
                <a href="/" class="text-decoration-none text-muted"><i class="bi bi-arrow-left me-1"></i> Siteye Dön</a>
            </div>
        </div>
    </div>
</body>
</html>
