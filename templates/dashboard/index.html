{% extends 'panel/base_panel.html' %}

{% block title %}Dashboard - Kurumsal CMS{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Dashboard Özet</h2>
</div>

<div class="row">
    <!-- Hizmetler Kartı -->
    <div class="col-md-3 mb-4">
        <div class="card text-white bg-primary h-100 shadow-sm border-0">
            <div class="card-body">
                <h5 class="card-title"><i class="bi bi-briefcase me-2"></i> Toplam Hizmet</h5>
                <h2 class="display-4 fw-bold mt-3">{{ total_services }}</h2>
            </div>
        </div>
    </div>
    
    <!-- Sayfalar Kartı -->
    <div class="col-md-3 mb-4">
        <div class="card text-white bg-success h-100 shadow-sm border-0">
            <div class="card-body">
                <h5 class="card-title"><i class="bi bi-file-earmark-text me-2"></i> Toplam Sayfa</h5>
                <h2 class="display-4 fw-bold mt-3">{{ total_pages }}</h2>
            </div>
        </div>
    </div>
    
    <!-- Toplam Mesajlar Kartı -->
    <div class="col-md-3 mb-4">
        <div class="card text-white bg-info h-100 shadow-sm border-0">
            <div class="card-body">
                <h5 class="card-title"><i class="bi bi-envelope me-2"></i> Toplam Mesaj</h5>
                <h2 class="display-4 fw-bold mt-3">{{ total_messages }}</h2>
            </div>
        </div>
    </div>
    
    <!-- Yeni Mesajlar Kartı -->
    <div class="col-md-3 mb-4">
        <div class="card text-white bg-warning h-100 shadow-sm border-0">
            <div class="card-body">
                <h5 class="card-title text-dark"><i class="bi bi-envelope-exclamation me-2"></i> Okunmamış Mesaj</h5>
                <h2 class="display-4 fw-bold mt-3 text-dark">{{ new_messages }}</h2>
            </div>
        </div>
    </div>
</div>
{% endblock %}
