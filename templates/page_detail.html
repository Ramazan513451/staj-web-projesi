{% extends "base.html" %}

{% block title %}{{ page.title }} | Kurumsal A.Ş.{% endblock %}

{% block content %}
<!-- Page Header -->
<div class="contact-header text-center">
    <div class="container">
        <h1 class="display-4 fw-bold mb-3">{{ page.title }}</h1>
        <p class="lead" style="color: rgba(255,255,255,0.8);">{{ site_settings.site_title|default:"Kurumsal A.Ş." }}</p>
    </div>
</div>

<!-- Page Content -->
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card service-card p-5" style="border: none; box-shadow: var(--card-shadow);">
                <div class="card-body">
                    <!-- Dinamik içerik alanı -->
                    <div class="page-content" style="line-height: 1.8; font-size: 1.1rem; color: var(--text-muted);">
                        {{ page.content|safe }}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
