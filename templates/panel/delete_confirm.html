{% extends 'panel/base_panel.html' %}

{% block title %}Silme İşlemini Onayla - Kurumsal CMS{% endblock %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-body text-center p-5">
        <h1 class="display-4 text-danger mb-4"><i class="bi bi-exclamation-triangle"></i></h1>
        <h3 class="mb-3">Silme İşlemini Onaylıyor musunuz?</h3>
        <p class="lead mb-4">"<strong>{{ object }}</strong>" öğesini silmek istediğinizden emin misiniz? Bu işlem geri alınamaz.</p>
        
        <form method="post">
            {% csrf_token %}
            <a href="{{ cancel_url }}" class="btn btn-secondary me-2">İptal</a>
            <button type="submit" class="btn btn-danger">Evet, Sil</button>
        </form>
    </div>
</div>
{% endblock %}
